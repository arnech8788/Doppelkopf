<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#1a9e8f">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Doppelkopf">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon-192.png" type="image/png">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="stylesheet" href="styles.css">
<title>Doppelkopf Punktezettel</title>
</head>
<body>
<div class="app" id="app">
  <div class="app-header">
    <span class="app-title">Doppelkopf</span>
    <button class="header-icon" onclick="openSettings()" aria-label="Einstellungen"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:20px;height:20px"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 01-2.83 2.83l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg></button>
  </div>

  <div id="turnierIndicator"></div>

  <div class="screen active" id="screen-mehr">
    <div id="mehrContent"></div>
  </div>

  <div class="screen" id="screen-eingabe">
    <div id="bockIndicator"></div>
    <div id="successMsg" class="success-msg"></div>
    <div id="spielerLeiste"></div>
    <div id="eingabeContent"></div>
  </div>

  <div class="screen" id="screen-tabelle">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px"><h2 style="margin-bottom:0">Spielverlauf</h2><button class="share-btn" onclick="shareTabelle()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg> Teilen</button></div>
    <div id="standsCard"></div>
    <div class="card">
      <div class="table-wrap" id="tableWrap"></div>
    </div>
  </div>

  <div class="screen" id="screen-stats">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px"><h2 style="margin-bottom:0">Statistiken</h2><button class="share-btn" onclick="shareStats()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg> Teilen</button></div>
    <div id="statsContent"></div>
  </div>
</div>

<nav class="bottom-nav" id="bottomNav">
  <button class="active" onclick="showScreen('eingabe')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 8v8M8 12h8"/></svg><span>Eingabe</span></button>
  <button onclick="showScreen('tabelle')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M3 15h18M9 3v18"/></svg><span>Tabelle</span></button>
  <button onclick="showScreen('stats')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg><span>Statistik</span></button>
  <button onclick="showScreen('mehr')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="5" r="1"/><circle cx="12" cy="12" r="1"/><circle cx="12" cy="19" r="1"/></svg><span>Mehr</span></button>
</nav>

<div class="modal-overlay" id="editModal" style="align-items:stretch;padding:0"><div class="modal" id="editModalContent" style="border-radius:0;border:none;max-height:100vh;height:100vh;padding:16px"></div></div>
<div class="modal-overlay" id="renameModal" style="align-items:flex-start;padding-top:40px"><div class="modal" id="renameModalContent" style="border-radius:var(--r);border:1px solid var(--bdr)"></div></div>
<div class="modal-overlay" id="soloModal"><div class="modal" id="soloModalContent"></div></div>
<div class="modal-overlay" id="infoModal" style="align-items:stretch;padding:0"><div class="modal" id="infoModalContent" style="border-radius:0;border:none;max-height:100vh;height:100vh;padding:16px"></div></div>
<div class="modal-overlay" id="calcHelpModal" style="align-items:stretch;padding:0"><div class="modal" id="calcHelpModalContent" style="border-radius:0;border:none;max-height:100vh;height:100vh;padding:16px"></div></div>
<div class="modal-overlay" id="calcModal" style="align-items:stretch;padding:0"><div class="modal" id="calcModalContent" style="border-radius:0;border:none;max-height:100vh;height:100vh;padding:16px"></div></div>
<div class="modal-overlay" id="debugModal" style="align-items:stretch;padding:0"><div class="modal" id="debugModalContent" style="border-radius:0;border:none;max-height:100vh;height:100vh;padding:16px;overflow-y:auto"></div></div>
<div class="modal-overlay" id="settingsModal" style="align-items:stretch;padding:0"><div class="modal" id="settingsModalContent" style="border-radius:0;border:none;max-height:100vh;height:100vh;padding:16px;overflow-y:auto"></div></div>
<div class="modal-overlay" id="allTimeModal" style="align-items:stretch;padding:0"><div class="modal" id="allTimeModalContent" style="border-radius:0;border:none;max-height:100vh;height:100vh;padding:16px;overflow-y:auto"></div></div>

<div class="modal-overlay" id="nameModal" style="align-items:center"><div class="modal" id="nameModalContent" style="border-radius:var(--r);border:1px solid var(--bdr);padding:24px;max-width:340px;width:90%"></div></div>
<div class="modal-overlay" id="turnierModal" style="align-items:stretch;padding:0"><div class="modal" id="turnierModalContent" style="border-radius:0;border:none;max-height:100vh;height:100vh;padding:16px;overflow-y:auto"></div></div>
<div class="modal-overlay" id="turnierCreateModal" style="align-items:stretch;padding:0"><div class="modal" id="turnierCreateContent" style="border-radius:0;border:none;max-height:100vh;height:100vh;padding:16px;overflow-y:auto"></div></div>
<div class="modal-overlay" id="turnierJoinModal" style="align-items:flex-start;padding-top:40px"><div class="modal" id="turnierJoinContent" style="border-radius:var(--r);border:1px solid var(--bdr);padding:20px;max-width:380px;width:90%"></div></div>

<div id="updateToast" class="update-toast">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/></svg>
  <span>Neue Version verfügbar – wird automatisch geladen…</span>
  <div class="reload-bar"></div>
</div>
<div class="app-toast" id="appToast"><span id="appToastText"></span><button onclick="hideToast()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button></div>
<div class="confirm-overlay" id="confirmOverlay"><div class="confirm-modal"><p id="confirmText"></p><div class="confirm-actions"><button class="confirm-cancel" id="confirmCancel">Abbrechen</button><button class="confirm-action" id="confirmAction">OK</button></div></div></div>

<script type="module" src="/src/main.js"></script>
<!-- Anonyme Besucherzählung (keine Cookies, keine personenbezogenen Daten) -->
<script data-goatcounter="https://doppelkopf.goatcounter.com/count"
        async src="//gc.zgo.at/count.js"></script>
</body>
</html>
