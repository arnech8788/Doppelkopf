<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a9e8f"/>
      <stop offset="100%" style="stop-color:#0e7568"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Card shape -->
  <rect x="136" y="76" width="240" height="360" rx="16" fill="#faf9f5" stroke="#e0ddd5" stroke-width="2"/>
  <!-- Club symbol top-left -->
  <text x="160" y="140" font-family="serif" font-size="48" fill="#1a1c24">♣</text>
  <!-- D for Dame -->
  <text x="256" y="290" font-family="Georgia,serif" font-size="120" fill="#1a1c24" text-anchor="middle" font-weight="bold">D</text>
  <!-- Club symbol bottom-right (rotated) -->
  <text x="352" y="410" font-family="serif" font-size="48" fill="#1a1c24" text-anchor="end" transform="rotate(180,336,390)">♣</text>
</svg>
