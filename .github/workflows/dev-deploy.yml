name: Deploy DEV to /dev folder

on:
  push:
    branches: ["dev"]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout dev branch
        uses: actions/checkout@v4
        with:
          ref: dev

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # /dev wird unter <domain>/dev/ ausgeliefert -> base muss /dev/ sein.
      - name: Build (base /dev/)
        run: npm run build -- --base=/dev/

      - name: Stage build output
        run: |
          rm -rf /tmp/dev-build
          mkdir -p /tmp/dev-build
          cp -r dist/* /tmp/dev-build/

      - name: Push to main
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git fetch origin main
          git checkout main

          rm -rf dev
          mkdir -p dev
          cp -r /tmp/dev-build/* dev/

          git add dev/
          git commit -m "Update dev version" || echo "No changes"
          git push
